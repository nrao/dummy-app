apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dummyapp.fullname" . }}
  labels:
    {{- include "dummyapp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "dummyapp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dummyapp.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      imagePullSecrets:
      {{- with .Values.imagePullSecrets }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.imageCredentials.password }}
        - name: '{{ include "dummyapp.fullname" . }}-registrykey'
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "ghcr.io/nrao/releng/dummy_app:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: SAMPLE_VAR
              value: {{ .Values.sampleVar }}
            - name: COLOR
              value: {{ .Values.color }}
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
