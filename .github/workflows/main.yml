name : CI
on:
  push:
    branches:
    - main
    tags:
    - 'v*'
  pull_request:
    types: ["labeled", "opened", "synchronize", "reopened"]
    branches:
      - main

env:
  SHOULD_PUBLISH: ${{ (github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'preview')) }}

jobs:
  prep_env:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ env.SHOULD_PUBLISH }}
      image_name: ${{ steps.imagename.outputs.image_name }}
      app_version: ${{ steps.setuptools.outputs.version }}
      argocd_app_name: ${{ steps.argocd.outputs.app_name }}
    steps:
      - name: Print env variable
        run: |
          echo "SHOULD_PUBLISH: ${{ env.SHOULD_PUBLISH }}"

      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Fix PATH for act (local actions testing)
        if: ${{ env.ACT }}
        run: |
          ACT_TOOL_PATHS=$(cat /etc/environment | grep "PATH=" | sed -e 's/PATH=//' | tr ":" "\n" | grep "${ACT_TOOLSDIRECTORY}" | tr '\n' ':' | tr -d ':')
          echo ":${ACT_TOOL_PATHS}" >> "$GITHUB_PATH"

      - run: pip install --root-user-action=ignore setuptools_scm

      - name: Get app version
        id: setuptools
        run: echo "version=$(python -m setuptools_scm)" >> "$GITHUB_OUTPUT"

      - name: Get image name
        id: imagename
        run: |
          echo "image_name=${{ !env.ACT && 'ghcr.io' || 'registry.localhost:5432' }}/nrao/releng/dummy_app" >> "$GITHUB_OUTPUT"
    
      - name: Get ArgoCD app name
        id: argocd
        run: |
          app_name="dummy-app-dev"
          event_name="${{ github.event_name }}"
          echo "app_name=${app_name}" >> "$GITHUB_OUTPUT"
    
      - name: Dump GitHub context (useful for debugging)
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    
    - name: Fix PATH for act (local actions testing)
      if: ${{ env.ACT }}
      run: |
        ACT_TOOL_PATHS=$(cat /etc/environment | grep "PATH=" | sed -e 's/PATH=//' | tr ":" "\n" | grep "${ACT_TOOLSDIRECTORY}" | tr '\n' ':' | tr -d ':')
        echo ":${ACT_TOOL_PATHS}" >> "$GITHUB_PATH"

    - name: Install dependencies
      run: |
        python -m pip install --root-user-action=ignore --upgrade pip
        pip install --root-user-action=ignore -e '.[all]'

    - name: Unit test with coverage
      run: |
        pytest --junitxml=junit/test-results.xml --cov=dummy_app --cov-report=xml

    - name: Upload test results
      if: ${{ !env.ACT && always() }}
      uses: actions/upload-artifact@v7
      with:
        name: pytest-results
        path: junit/test-results.xml

    - name: Upload coverage results
      if: ${{ !env.ACT && always() }}
      uses: actions/upload-artifact@v7
      with:
        name: coverage-results
        path: coverage.xml

  docker:
    runs-on: ubuntu-latest
    needs: [prep_env]
    steps:
      - uses: actions/checkout@v6

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ needs.prep_env.outputs.image_name }}
          tags: |
            type=ref,event=tag
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=edge

      - name: Login to GitHub container registry
        if: ${{ needs.prep_env.outputs.should_publish == 'true' && !env.ACT }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: network=host
          buildkitd-config-inline: |
            [registry."registry.localhost:5432"]
              http = true

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          build-args: |
            VERSION=${{ needs.prep_env.outputs.app_version }}
          push: ${{ needs.prep_env.outputs.should_publish == 'true' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  argocd:
    runs-on: ubuntu-latest
    needs: [prep_env, docker]
    if: ${{ needs.prep_env.outputs.should_publish == 'true' }}
    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/
          argocd version --client

      - name: Login to ArgoCD
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} \
            --username ${{ secrets.ARGOCD_USERNAME }} \
            --password "${{ secrets.ARGOCD_PASSWORD }}" \
            --insecure --skip-test-tls \
            --grpc-web

      - name: Trigger sync
        run: |
          # Trigger a sync for the application
          argocd app sync dummy-app-dev --grpc-web

      - name: Wait for sync to complete
        run: |
          # Wait up to 5 minutes for the sync to finish
          argocd app wait dummy-app-dev \
            --sync \
            --health \
            --timeout 300 \
            --grpc-web

      - name: Verify deployment health
        id: deployment_check
        run: |
          # Check that the application is healthy
          STATUS="$(argocd app get dummy-app-dev -o json --grpc-web | jq -r '.status.health.status')"
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" != "Healthy" ]; then
            echo "Application is not healthy: $STATUS"
            exit 1
          fi
          echo "Application is healthy!"
          ## Get External URL
          URL="$(argocd app get dummy-app-dev -o json --grpc-web | jq -r '.status.summary.externalURLs[0]')"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "Application URL: $URL"
      
      - name: Post comment with status and URL
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'This is a comment from Actions\nApp status: ${{ steps.deployment_check.outputs.status }}\nURL: ${{ steps.deployment_check.outputs.url }}'
            })
