name : CI
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - 
      uses: actions/checkout@v6
    -
      run: echo $PATH
    - 
      name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        # update-environment: false
    # -
    #   run: export PATH=/opt/acttoolcache/node/24.17.0/x64/bin:${PATH}
    # -
    #   run: echo $PATH
    # -
    #   run: which node
    - 
      name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e '.[all]'
    - 
      name: Unit test with coverage
      run: |
        pytest --junitxml=junit/test-results.xml --cov=dummy_app --cov-report=xml --cov-report=html
  docker:
    runs-on: ubuntu-latest
    steps:
  #     - 
  #       name: Login to GitHub container registry
  #       if: github.event_name != 'pull_request'
  #       uses: docker/login-action@v4
  #       with:
  #         registry: ghcr.io
  #         username: ${{ github.actor }}
  #         password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: false #${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/nrao/releng/dummy_app:latest
