name : CI
on:
  push:
    branches:
    - main
    tags:
    - 'v*'
  pull_request:
    types: ["labeled", "opened", "synchronize", "reopened"]
    branches:
      - main

env:
  SHOULD_PUBLISH: ${{ (github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'preview')) }}

jobs:
  prep_env:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ env.SHOULD_PUBLISH && !env.ACT }}
      app_version: ${{ steps.setuptools.outputs.version }}
    steps:
      - name: Print env variable
        run: |
          echo "SHOULD_PUBLISH: ${{ env.SHOULD_PUBLISH }}"

      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Fix PATH for act (local actions testing)
        if: ${{ env.ACT }}
        run: |
          ACT_TOOL_PATHS=$(cat /etc/environment | grep "PATH=" | sed -e 's/PATH=//' | tr ":" "\n" | grep "${ACT_TOOLSDIRECTORY}" | tr '\n' ':' | tr -d ':')
          echo ":${ACT_TOOL_PATHS}" >> "$GITHUB_PATH"

      - run: pip install --root-user-action=ignore setuptools_scm

      - name: Get app version
        id: setuptools
        run: echo "version=$(python -m setuptools_scm)" >> "$GITHUB_OUTPUT"
    
      # - name: Dump GitHub context (useful for debugging)
      #   env:
      #     GITHUB_CONTEXT: ${{ toJson(github) }}
      #   run: echo "$GITHUB_CONTEXT"

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    
    - name: Fix PATH for act (local actions testing)
      if: ${{ env.ACT }}
      run: |
        ACT_TOOL_PATHS=$(cat /etc/environment | grep "PATH=" | sed -e 's/PATH=//' | tr ":" "\n" | grep "${ACT_TOOLSDIRECTORY}" | tr '\n' ':' | tr -d ':')
        echo ":${ACT_TOOL_PATHS}" >> "$GITHUB_PATH"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e '.[all]'

    - name: Unit test with coverage
      run: |
        pytest --junitxml=junit/test-results.xml --cov=dummy_app --cov-report=xml

    - name: Upload test results
      if: ${{ !env.ACT && always() }}
      uses: actions/upload-artifact@v7
      with:
        name: pytest-results
        path: junit/test-results.xml

    - name: Upload coverage results
      if: ${{ !env.ACT && always() }}
      uses: actions/upload-artifact@v7
      with:
        name: coverage-results
        path: coverage.xml

  docker:
    runs-on: ubuntu-latest
    needs: [prep_env]
    steps:
      - uses: actions/checkout@v6

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/nrao/releng/dummy_app
          tags: |
            type=ref,event=tag
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=edge

      - name: Login to GitHub container registry
        if: needs.prep_env.outputs.should_publish == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          build-args: |
            VERSION=${{ needs.prep_env.outputs.app_version }}
          push: ${{ needs.prep_env.outputs.should_publish == 'true' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
